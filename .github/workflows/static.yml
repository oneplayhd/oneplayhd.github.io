name: Legacy Pages deploy (desativado)

# Não publica automaticamente. A publicação oficial é feita pelo index.yml,
# que executa generate_index.py e depois faz um único deploy do GitHub Pages.
on:
  workflow_dispatch:

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Aviso
        run: |
          echo "Workflow antigo desativado para impedir deploys duplicados."
          echo "Para publicar manualmente, execute o workflow: Atualizar indice e publicar GitHub Pages."
