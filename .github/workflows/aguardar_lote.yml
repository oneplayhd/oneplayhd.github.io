name: Aguardar lote OnePlay

on:
  push:
    branches: ["master"]
    # O bot só altera index.html; esses commits não devem reiniciar a janela.
    paths-ignore:
      - "index.html"
      - "**/index.html"
  workflow_dispatch:
    inputs:
      publicar_agora:
        description: "Pular a espera de 10 minutos nesta execução"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

# Esta concorrência existe apenas para a espera. Um commit novo cancela a espera
# anterior e reinicia a janela de 10 minutos, sem tocar em publicação já iniciada.
concurrency:
  group: oneplay-pages-debounce-master
  cancel-in-progress: true

jobs:
  aguardar:
    name: Aguardar 10 minutos sem novas alterações
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Aguardar estabilização do lote
        shell: bash
        env:
          PUBLICAR_AGORA: ${{ github.event_name == 'workflow_dispatch' && inputs.publicar_agora || false }}
        run: |
          set -euo pipefail

          if [ "$PUBLICAR_AGORA" = "true" ]; then
            echo "Execução manual: a espera foi ignorada."
            exit 0
          fi

          echo "Aguardando 10 minutos sem novo commit antes de consolidar os índices e publicar o Pages..."
          sleep 600

      - name: Confirmar lote estabilizado
        run: echo "Lote estabilizado. A publicação será acionada pela conclusão deste workflow."
