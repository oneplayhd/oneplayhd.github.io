name: Publicar indice e GitHub Pages

on:
  push:
    branches: ["master"]
    # O gerenciador publica este arquivo ao finalizar uma alteração no repositório.
    # Assim, ZIP + metadata geram somente UM deploy completo do Pages.
    paths:
      - "addons.xml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Mantém somente a publicação mais recente. Evita filas concorrentes no Pages.
concurrency:
  group: "oneplay-pages-publicacao"
  cancel-in-progress: true

jobs:
  publish:
    name: Gerar indice e publicar
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Gerar indice dinamico
        run: python generate_index.py

      - name: Salvar apenas o index gerado
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Nunca use git add -A aqui: o workflow deve versionar exclusivamente o index.html.
          git add -- index.html

          if git diff --cached --quiet; then
            echo "Index sem alteracoes."
          else
            git commit -m "index.html [skip ci]"
            git pull --rebase origin master
            git push origin HEAD:master
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar repositorio publicado
        uses: actions/upload-pages-artifact@v3
        with:
          # O repositório Kodi permanece integralmente acessível em oneplayhd.github.io.
          path: "."

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
