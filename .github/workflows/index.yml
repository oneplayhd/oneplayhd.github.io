name: Atualizar indice e publicar GitHub Pages

on:
  push:
    branches: ["master"]
    # O generate_index.py só depende dos ZIPs, do README.md da raiz e do próprio script.
    # Alterações em index.html não entram aqui: assim, o commit gerado não dispara outro ciclo.
    paths:
      - "**/*.zip"
      - "README.md"
      - "generate_index.py"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Um único fluxo controla geração + Pages. Quando entra uma atualização mais nova,
# a execução antiga é cancelada antes de ficar presa na fila do Pages.
concurrency:
  group: "oneplay-pages-publicacao"
  cancel-in-progress: true

jobs:
  publish:
    name: Gerar todos os indices e publicar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Executa o arquivo original sem alteração, a partir da raiz do repositório.
      - name: Executar generate_index.py
        run: python generate_index.py

      # O script cria, atualiza e remove index.html na raiz e em subpastas.
      # git add -A é necessário para registrar também índices removidos pelo próprio gerador.
      - name: Salvar indices gerados no repositorio
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nenhum index.html precisou ser alterado."
          else
            git commit -m "index.html"
            # Integra eventuais metadados enviados pelo painel enquanto o índice era gerado.
            git pull --rebase origin master
            git push origin HEAD:master
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar repositorio publicado
        uses: actions/upload-pages-artifact@v3
        with:
          # Mantém ZIPs, addons.xml e todos os index.html acessíveis pelo Pages/Kodi.
          path: "."

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
