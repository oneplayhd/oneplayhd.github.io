name: Gerar índices e publicar GitHub Pages

on:
  workflow_run:
    workflows: ["Aguardar lote OnePlay"]
    types: [completed]
    branches: ["master"]

permissions:
  contents: write
  pages: write
  id-token: write

# Esta concorrência é independente da espera. Uma publicação que já começou
# nunca é cancelada por upload/remoção novo; no máximo a próxima fica na fila.
concurrency:
  group: oneplay-pages-publicacao-master
  cancel-in-progress: false

jobs:
  publicar:
    # Execuções canceladas durante os 10 minutos não chegam à publicação.
    if: github.event.workflow_run.conclusion == 'success'
    name: Gerar índices e publicar revisão consolidada
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout completo da master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Gerar índices na revisão que completou os 10 minutos
        id: gerar
        shell: bash
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "publish=false" >> "$GITHUB_OUTPUT"

          # O workflow de espera pertence a SOURCE_SHA. Se uma atualização mais
          # nova chegou antes desta publicação começar, ela ganha sua própria
          # janela de 10 minutos; esta execução encerra limpa, sem publicar
          # estado intermediário ou marcar falha.
          git fetch --no-tags origin +refs/heads/master:refs/remotes/origin/master
          git checkout --force -B master origin/master
          git clean -ffd
          base_sha="$(git rev-parse HEAD)"

          if [ "$base_sha" != "$SOURCE_SHA" ]; then
            echo "A master avançou antes da publicação. A revisão mais nova será tratada pelo próximo lote."
            exit 0
          fi

          # Mantém generate_index.py intacto: ele continua sendo a única fonte
          # para criar, atualizar e remover index.html na raiz e subpastas.
          python generate_index.py
          git add -A

          # Não cria índice sobre uma master que mudou enquanto o gerador rodava.
          remoto_sha="$(git ls-remote origin refs/heads/master | awk 'NR==1 {print $1}')"
          if [ "$remoto_sha" != "$base_sha" ]; then
            echo "A master mudou durante a geração. O próximo lote consolidará a revisão nova."
            exit 0
          fi

          if git diff --cached --quiet; then
            publish_sha="$base_sha"
            echo "Os índices já estavam atualizados para esta revisão."
          else
            # Cinto de segurança: o bot nunca deve commitar ZIP, XML, MD5 ou
            # qualquer outro arquivo do painel. Apenas index.html é permitido.
            python -c 'import subprocess,sys; raw=subprocess.check_output(["git","diff","--cached","--name-only","-z"]); paths=[p.decode("utf-8","surrogateescape") for p in raw.split(b"\0") if p]; unsafe=[p for p in paths if not (p=="index.html" or p.endswith("/index.html"))]; print("Alteração fora de index.html detectada; push bloqueado por segurança:\n" + "\n".join(unsafe)) if unsafe else None; sys.exit(1 if unsafe else 0)'

            git commit -m "index.html"

            # Se outro usuário/painel enviou alteração no instante do push, não
            # falha e não tenta rebasear no meio do lote. A nova alteração já
            # iniciou sua própria espera de 10 minutos.
            if ! git push origin HEAD:refs/heads/master; then
              git fetch --no-tags origin +refs/heads/master:refs/remotes/origin/master
              atual="$(git rev-parse refs/remotes/origin/master)"
              if [ "$atual" != "$base_sha" ]; then
                echo "Outro commit entrou antes do push. Esta publicação encerra limpa; o novo lote assumirá."
                exit 0
              fi
              echo "O push falhou sem mudança concorrente na master. Intervenção necessária."
              exit 1
            fi

            publish_sha="$(git rev-parse HEAD)"
            echo "Índices enviados em $publish_sha"
          fi

          # Depois que o commit de índices foi aceito, esta publicação termina
          # normalmente mesmo que chegue novo ZIP. O novo commit fica agendado
          # no workflow de espera e será publicado no próximo ciclo.
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "publish_sha=$publish_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout exato da revisão a publicar
        if: steps.gerar.outputs.publish == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.gerar.outputs.publish_sha }}
          fetch-depth: 1

      - name: Configurar GitHub Pages
        if: steps.gerar.outputs.publish == 'true'
        uses: actions/configure-pages@v6.0.0

      - name: Criar artefato do Pages
        if: steps.gerar.outputs.publish == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          # Publica o repositório inteiro: ZIPs, XMLs, MD5s, imagens e índices.
          path: "."

      - name: Deploy para GitHub Pages
        if: steps.gerar.outputs.publish == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
